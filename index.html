<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMIT GPA Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind configuration to enable dark mode toggling via class
        tailwind.config = {
            darkMode: 'class',
        }
        
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 dark:bg-[#0b0f1a] p-4 md:p-8 font-sans text-slate-700 dark:text-slate-300 transition-colors duration-200">

    <div class="max-w-2xl mx-auto bg-white dark:bg-[#161b2e] rounded-3xl shadow-xl border border-slate-200 dark:border-slate-800 overflow-hidden transition-colors duration-200">
        <div class="px-8 py-6 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center">
            <div>
                <h2 class="text-xl font-bold text-slate-900 dark:text-white tracking-tight">GPA Calculator</h2>
                <p class="text-xs text-slate-500 mt-1">Sikkim Manipal Institute of Technology (2025-26)</p>
            </div>
            <button onclick="toggleTheme()" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors" aria-label="Toggle Theme">
                <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                </svg>
                <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                </svg>
            </button>
        </div>

        <div class="p-8 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">Branch</label>
                    <select id="branchSelect" onchange="initSems()" class="w-full bg-slate-50 dark:bg-[#0b0f1a] border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-3 text-sm text-slate-900 dark:text-white focus:ring-1 focus:ring-indigo-500 outline-none appearance-none cursor-pointer transition-colors duration-200">
                        <option value="common">First Year (All Branches)</option>
                        <option value="cse">B.Tech CSE</option>
                        <option value="csds">B.Tech CSE (Data Science)</option>
                        <option value="csaiml">B.Tech CSE (AI & ML)</option>
                        <option value="csiot">B.Tech CSE (IoT & Cyber Security)</option>
                        <option value="ece">B.Tech ECE</option>
                        <option value="vlsi">B.Tech Electronics (VLSI)</option>
                        <option value="eee">B.Tech EEE</option>
                        <option value="it">B.Tech CS & IT</option>
                        <option value="me">B.Tech Mechanical Engg</option>
                        <option value="ce">B.Tech Civil Engg</option>
                        <option value="cst">B.Tech CS & Technology</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">Semester</label>
                    <select id="semSelect" onchange="loadSubjects()" class="w-full bg-slate-50 dark:bg-[#0b0f1a] border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-3 text-sm text-slate-900 dark:text-white focus:ring-1 focus:ring-indigo-500 outline-none appearance-none cursor-pointer transition-colors duration-200"></select>
                </div>
            </div>

            <div id="cycleArea" class="hidden space-y-1">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">Study Cycle</label>
                <select id="cycleSelect" onchange="loadSubjects()" class="w-full bg-slate-50 dark:bg-[#0b0f1a] border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-3 text-sm text-slate-900 dark:text-white focus:ring-1 focus:ring-indigo-500 outline-none appearance-none cursor-pointer transition-colors duration-200">
                    <option value="physics">Physics Cycle</option>
                    <option value="chemistry">Chemistry Cycle</option>
                </select>
            </div>
        </div>

        <div class="px-8 pb-8">
            <div id="subjectList" class="space-y-2 mb-8"></div>

            <div class="bg-slate-50 dark:bg-[#0b0f1a] border border-slate-200 dark:border-slate-800 rounded-2xl p-6 text-center transition-colors duration-200">
                <span class="text-[10px] font-bold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest block mb-1">Semester GPA</span>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="gpaOut" class="text-5xl font-black text-slate-900 dark:text-white">0.00</span>
                    <span class="text-lg font-bold text-slate-400 dark:text-slate-700">/ 10</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
