<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMIT GPA Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0b0f1a] p-4 md:p-8 font-sans text-slate-300">

    <div class="max-w-2xl mx-auto bg-[#161b2e] rounded-3xl shadow-xl border border-slate-800 overflow-hidden">
        <div class="px-8 py-6 border-b border-slate-800">
            <h2 class="text-xl font-bold text-white tracking-tight">GPA Calculator</h2>
            <p class="text-xs text-slate-500 mt-1">Sikkim Manipal Institute of Technology (2025-26)</p>
        </div>

        <div class="p-8 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">Branch</label>
                    <select id="branchSelect" onchange="initSems()" class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:ring-1 focus:ring-indigo-500 outline-none appearance-none cursor-pointer">
                        <option value="common">First Year (All Branches)</option>
                        <option value="cse">B.Tech CSE</option>
                        <option value="csds">B.Tech CSE (Data Science)</option>
                        <option value="csaiml">B.Tech CSE (AI & ML)</option>
                        <option value="csiot">B.Tech CSE (IoT & Cyber Security)</option>
                        <option value="ece">B.Tech ECE</option>
                        <option value="vlsi">B.Tech Electronics (VLSI)</option>
                        <option value="eee">B.Tech EEE</option>
                        <option value="it">B.Tech CS & IT</option>
                        <option value="me">B.Tech Mechanical Engg</option>
                        <option value="ce">B.Tech Civil Engg</option>
                        <option value="cst">B.Tech CS & Technology</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">Semester</label>
                    <select id="semSelect" onchange="loadSubjects()" class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:ring-1 focus:ring-indigo-500 outline-none appearance-none cursor-pointer"></select>
                </div>
            </div>

            <div id="cycleArea" class="hidden space-y-1">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">Study Cycle</label>
                <select id="cycleSelect" onchange="loadSubjects()" class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:ring-1 focus:ring-indigo-500 outline-none appearance-none cursor-pointer">
                    <option value="physics">Physics Cycle</option>
                    <option value="chemistry">Chemistry Cycle</option>
                </select>
            </div>
        </div>

        <div class="px-8 pb-8">
            <div id="subjectList" class="space-y-2 mb-8"></div>

            <div class="bg-[#0b0f1a] border border-slate-800 rounded-2xl p-6 text-center">
                <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest block mb-1">Semester GPA</span>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="gpaOut" class="text-5xl font-black text-white">0.00</span>
                    <span class="text-lg font-bold text-slate-700">/ 10</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
